services:
  - type: web
    name: AIMORAL
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir . project.wsgi:application --bind 0.0.0.0:$PORT
    releaseCommand: python manage.py migrate
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "your-app.onrender.com,moralmachine-3.onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://your-app.onrender.com,https://moralmachine-3.onrender.com"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "True"
    secretVars:
      - key: DJANGO_SECRET_KEY
        value: "replace-with-secret"
