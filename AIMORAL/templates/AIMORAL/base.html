<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Moral Lab{% endblock %}</title>
    <style>
        :root {
            --ink: #201a18;
            --paper: #f5efe7;
            --card: #fffaf4;
            --line: #e7d9cb;
            --accent: #1b5e73;
            --accent-soft: #78aebe;
            --warm: #d67b36;
            --positive: #2b6ed2;
            --muted: #665b53;
            --track: #ddd4ca;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 0% 0%, #f7dbc3 0%, transparent 32%),
                radial-gradient(circle at 95% 5%, #dcedf4 0%, transparent 38%),
                var(--paper);
            min-height: 100vh;
        }
        .container {
            max-width: 1080px;
            margin: 0 auto;
            padding: 28px 16px 40px;
        }
        .panel {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 10px 24px rgba(32, 26, 24, 0.08);
        }
        h1, h2, h3 {
            margin-top: 0;
            letter-spacing: 0;
        }
        p { line-height: 1.55; }
        .muted { color: var(--muted); }
        .eyebrow {
            display: inline-block;
            margin-bottom: 10px;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--accent);
        }
        .tag-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
        }
        .tag {
            display: inline-flex;
            align-items: center;
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 6px 10px;
            background: white;
            font-size: 0.82rem;
            color: var(--muted);
        }
        .btn {
            border: 0;
            border-radius: 999px;
            padding: 12px 22px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 14px rgba(27, 94, 115, 0.24);
        }
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        .form-grid {
            display: grid;
            gap: 14px;
            grid-template-columns: 1fr 1fr;
            margin: 18px 0;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 0.92rem;
            color: var(--muted);
        }
        .field span {
            font-weight: 700;
            color: var(--ink);
        }
        .field input,
        .field select {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 12px 14px;
            background: white;
            color: var(--ink);
            font: inherit;
        }
        .field input:focus,
        .field select:focus {
            outline: 2px solid rgba(27, 94, 115, 0.18);
            border-color: var(--accent);
        }
        .consent-field {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 10px;
            margin: 18px 0;
            font-size: 0.92rem;
            color: var(--ink);
        }
        .consent-field input[type="checkbox"] {
            width: auto;
            margin: 0;
            flex: 0 0 auto;
        }
        .consent-field span {
            font-weight: 400;
            color: var(--ink);
        }
        .form-error {
            margin: 14px 0 0;
            color: #9f2d2d;
            font-weight: 600;
        }
        .btn-secondary {
            background: var(--warm);
            color: white;
        }
        .progress-wrap {
            width: 100%;
            background: #e8ded3;
            border-radius: 999px;
            overflow: hidden;
            height: 12px;
            margin: 14px 0 22px;
        }
        .progress-bar {
            height: 12px;
            background: linear-gradient(90deg, var(--accent), var(--accent-soft));
        }
        .choice-grid {
            display: grid;
            gap: 16px;
            grid-template-columns: 1fr 1fr;
        }
        .choice-card {
            border: 1px solid var(--line);
            background: white;
            border-radius: 12px;
            padding: 18px;
            min-height: 220px;
            display: flex;
            flex-direction: column;
        }
        .choice-card p {
            flex: 1;
            margin-bottom: 18px;
        }
        .dashboard-grid {
            display: grid;
            gap: 14px;
        }
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            margin: 18px 0 12px;
        }
        .kpi {
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 14px;
            background: white;
        }
        .kpi h3 {
            margin-bottom: 8px;
            font-size: 1rem;
        }
        .section-block {
            border-top: 1px solid var(--line);
            padding-top: 18px;
            margin-top: 18px;
        }
        .section-block h2 {
            margin-bottom: 6px;
            font-size: 1.15rem;
        }
        .scale-grid {
            display: grid;
            gap: 12px;
            margin-top: 12px;
        }
        .scale-card {
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 12px 14px;
            background: white;
        }
        .scale-head {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: baseline;
            margin-bottom: 8px;
        }
        .scale-head h3 {
            margin: 0;
            font-size: 0.98rem;
        }
        .scale-values {
            display: flex;
            gap: 10px;
            font-size: 0.84rem;
            color: var(--muted);
            white-space: nowrap;
        }
        .scale-labels {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 6px;
        }
        .track-wrap {
            max-width: 680px;
        }
        .track {
            position: relative;
            height: 10px;
            border-radius: 999px;
            background: var(--track);
        }
        .track-mid {
            position: absolute;
            top: -3px;
            left: 50%;
            width: 2px;
            height: 16px;
            background: #998f85;
            transform: translateX(-1px);
        }
        .marker {
            position: absolute;
            top: -4px;
            height: 18px;
            width: 5px;
            border-radius: 3px;
            transform: translateX(-2px);
        }
        .marker-user { background: var(--positive); }
        .marker-global { background: var(--warm); }
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            font-size: 0.8rem;
            margin-top: 7px;
            color: var(--muted);
        }
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 5px;
            vertical-align: middle;
        }
        .dot-user { background: var(--positive); }
        .dot-global { background: var(--warm); }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            font-size: 0.94rem;
        }
        th, td {
            border-bottom: 1px solid #eaded1;
            padding: 10px 8px;
            text-align: left;
            vertical-align: top;
        }
        th {
            font-size: 0.82rem;
            text-transform: uppercase;
            color: var(--muted);
            letter-spacing: 0.03em;
        }
        .footer-note {
            margin-top: 14px;
            font-size: 0.92rem;
        }
        @media (max-width: 860px) {
            .form-grid,
            .choice-grid,
            .kpi-row {
                grid-template-columns: 1fr;
            }
            .scale-head {
                flex-direction: column;
                align-items: flex-start;
            }
            table,
            thead,
            tbody,
            th,
            td,
            tr {
                display: block;
            }
            thead {
                display: none;
            }
            tr {
                border-bottom: 1px solid #eaded1;
                padding: 8px 0;
            }
            td {
                border: 0;
                padding: 4px 0;
            }
            td::before {
                content: attr(data-label);
                display: block;
                font-size: 0.78rem;
                text-transform: uppercase;
                color: var(--muted);
                margin-bottom: 2px;
            }
        }
    </style>
</head>
<body>
<main class="container">
    {% block content %}{% endblock %}
</main>
</body>
</html>
